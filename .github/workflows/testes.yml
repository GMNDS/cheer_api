name: Testes

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  phpunit:
    name: Testes PHP
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo
        uses: actions/checkout@v6

      - name: Preparar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.5'
          coverage: none
          tools: composer:v2

      - name: Instalar dependencias
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Rodar testes
        run: composer test
