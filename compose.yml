services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
#    ports:
#      - '8000:80'
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: '3306'
    depends_on:
      db:
        condition: service_healthy
    labels:
      traefik.enable: 'true'
      traefik.docker.network: ${TRAEFIK_NETWORK:-proxy}
      traefik.http.routers.cheer-api.rule: Host(`${HOST:?defina HOST no arquivo .env}`)
      traefik.http.routers.cheer-api.entrypoints: ${TRAEFIK_ENTRYPOINT:-websecure}
      traefik.http.routers.cheer-api.tls: ${TRAEFIK_TLS:-true}
 #     traefik.http.routers.cheer-api.tls.certresolver: ${TRAEFIK_CERTRESOLVER:-letsencrypt}
      traefik.http.services.cheer-api.loadbalancer.server.port: '80'
    networks:
      - database
      - traefik

  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cheer_api}
      MYSQL_USER: ${DB_USERNAME:-cheer}
      MYSQL_PASSWORD: ${DB_PASSWORD:?defina DB_PASSWORD no arquivo .env}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?defina DB_ROOT_PASSWORD no arquivo .env}
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -u root -p$$MYSQL_ROOT_PASSWORD --silent']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    volumes:
      - database_data:/var/lib/mysql
      - ./database/migrations/001_create_initial_schema.sql:/docker-entrypoint-initdb.d/001_create_initial_schema.sql:ro
    networks:
      - database

volumes:
  database_data:

networks:
  database:
  traefik:
    external: true
    name: ${TRAEFIK_NETWORK:-proxy}
